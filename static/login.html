<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NetObserv</title>

    <link rel="stylesheet" href="/static/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="brand">

            <img 
                src="/static/NetObserv%20Logo%20cut.png"
                alt="NetObserv Logo"
                class="brand-logo"
            >

            <h1>NetObserv</h1>

            <p>Network Observability Platform</p>

        </div>

        <div class="hero-text">
            <h2>Monitor. Analyze. Predict.</h2>

            <p>
                AI-powered network monitoring platform with anomaly detection,
                topology analysis, and predictive observability.
            </p>
        </div>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Welcome Back</h2>
            <p class="sub">Login to access your monitoring dashboard</p>

            <form id="loginForm">

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>

                <button type="submit" class="btn-primary">
                    Login
                </button>

            </form>

            <p class="switch-page">
                Don’t have an account?
                <a href="/signup">Create Account</a>
            </p>

        </div>

    </div>

</div>

<script src="/static/auth.js"></script>

</body>
</html>
