<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NetObserv</title>

    <link rel="stylesheet" href="/static/auth.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="auth-container">

    <div class="auth-left">

        <div class="brand">
            <h1>NetObserv</h1>
            <p>Network Observability Platform</p>
        </div>

        <div class="hero-text">
            <h2>Create Your Workspace</h2>

            <p>
                Manage network infrastructure with intelligent monitoring,
                analytics, and predictive fault detection.
            </p>
        </div>

    </div>

    <div class="auth-right">

        <div class="auth-card">

            <h2>Create Account</h2>
            <p class="sub">Start using NetObserv platform</p>

            <form id="signupForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create password">
                </div>

                <button type="submit" class="btn-primary">
                    Create Account
                </button>

            </form>

            <p class="switch-page">
                Already have an account?
                <a href="/login">Login</a>
            </p>

        </div>

    </div>

</div>

<script src="/static/auth.js"></script>

</body>
</html>
